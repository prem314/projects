<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#111316">
    <title>Pixel Tetris</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="assets/icon.svg">
    <link rel="stylesheet" href="src/styles.css">
  </head>
  <body>
    <main class="app">
      <section class="board-shell" aria-label="Game board">
        <canvas id="gameCanvas" width="320" height="640"></canvas>
      </section>

      <aside class="panel">
        <div class="title-row">
          <h1>Tetris</h1>
          <button class="icon-button" id="pauseButton" data-action="pause" aria-label="Pause">II</button>
        </div>

        <div class="stats">
          <div>
            <span>Score</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span>Lines</span>
            <strong id="lines">0</strong>
          </div>
          <div>
            <span>Level</span>
            <strong id="level">1</strong>
          </div>
          <div>
            <span>State</span>
            <strong id="state">Live</strong>
          </div>
        </div>

        <section class="next-box">
          <h2>Next</h2>
          <canvas id="nextCanvas" width="160" height="160"></canvas>
        </section>

        <div class="action-row">
          <button data-action="restart">Restart</button>
          <button id="botButton" data-action="bot">Bot</button>
        </div>
      </aside>

      <nav class="touch-controls" aria-label="Touch controls">
        <button data-action="left" aria-label="Move left">&larr;</button>
        <button data-action="rotate" aria-label="Rotate">&#8635;</button>
        <button data-action="right" aria-label="Move right">&rarr;</button>
        <button data-action="down" aria-label="Soft drop">&darr;</button>
        <button class="wide" data-action="drop" aria-label="Hard drop">&#10515;</button>
      </nav>
    </main>

    <script type="module" src="src/app.js"></script>
  </body>
</html>
